<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings - Aqua Trail</title>
    <link rel="stylesheet" th:href="@{/user/style.css}">
    <style>
        .header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .header-nav {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .my-bookings-btn, .register-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .my-bookings-btn:hover, .register-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(103, 126, 234, 0.3);
            color: white;
            text-decoration: none;
        }

        .register-btn {
            background: linear-gradient(135deg, #4CAF50 0%, #2E7D32 100%);
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-profile-link {
            color: #2c3e50;
            font-weight: 600;
            text-decoration: none;
        }

        .user-profile-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }

            .header-nav {
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚤 Aqua Trail Boat Safari</h1>
            <div class="header-nav">
                <div th:if="${session.customer != null}" class="user-profile">
                    <a href="/profile" class="user-profile-link">
                        <span th:text="${session.customer.name}">User Name</span>
                    </a>
                    <a href="/logout" class="my-bookings-btn">Logout</a>
                </div>
                <div th:if="${session.customer == null}">
                    <a href="/login" class="my-bookings-btn">Login</a>
                    <a href="/register" class="register-btn">Register</a>
                </div>
                <a href="/offers" class="my-bookings-btn">🎁 Offers</a>
                <a href="/feedback" class="my-bookings-btn">💬 Feedback</a>
                <a href="/bookings" class="my-bookings-btn">📝 My Bookings</a>
            </div>
        </div>

        <div class="bookings-container">
            <h2>My Bookings</h2>
            
            <div th:if="${bookings != null and !bookings.empty}" class="bookings-list">
                <div th:each="booking : ${bookings}" class="booking-card">
                    <div class="booking-header">
                        <h3 th:text="${booking.tripName}">Trip Name</h3>
                        <span th:text="${booking.status}" 
                              th:class="${booking.status == 'confirmed' ? 'status-badge' : 'status-badge status-inactive'}">Status</span>
                    </div>
                    
                    <div class="booking-details">
                        <div class="detail-item">
                            <label>Booking ID:</label>
                            <span th:text="${booking.id}">12345</span>
                        </div>
                        
                        <div class="detail-item">
                            <label>Customer:</label>
                            <span th:text="${booking.customerName}">Customer Name</span>
                        </div>
                        
                        <div class="detail-item">
                            <label>Email:</label>
                            <span th:text="${booking.customerEmail}">customer@example.com</span>
                        </div>
                        
                        <div class="detail-item">
                            <label>Date:</label>
                            <span th:text="${#temporals.format(booking.bookingDate, 'yyyy-MM-dd HH:mm')}">2023-01-01 10:00</span>
                        </div>
                        
                        <div class="detail-item">
                            <label>Price:</label>
                            <span th:text="${'LKR ' + booking.totalPrice}">LKR 5000.00</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div th:if="${bookings == null or bookings.empty}" class="no-bookings">
                <h3>📝 No Bookings Found</h3>
                <p>You haven't made any bookings yet. <a href="/">Browse our trips</a> and book your adventure!</p>
            </div>
        </div>
    </div>
</body>
</html>
